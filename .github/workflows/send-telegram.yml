name: Render & Send Briefing

on:
  push:
    paths:
      - 'briefings/data-*.json'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find latest data file
        id: find
        run: |
          FILE=$(ls -t briefings/data-*.json | head -1)
          DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}')
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Found: $FILE (date: $DATE)"

      - name: Build HTML with embedded data
        run: |
          node -e "
          const fs = require('fs');
          const data = fs.readFileSync('${{ steps.find.outputs.file }}', 'utf8');
          let template = fs.readFileSync('template.html', 'utf8');
          const inject = '<script>var DATA = ' + data + '; render(DATA);</script>';
          template = template.replace('</body>', inject + '</body>');
          fs.writeFileSync('briefings/latest.html', template);
          fs.writeFileSync('index.html', template);
          console.log('HTML built');
          "

      - name: Commit HTML to repo for GitHub Pages
        run: |
          git config user.name "Market Briefing Bot"
          git config user.email "bot@market-briefing.local"
          git add briefings/latest.html index.html
          git commit -m "Render briefing ${{ steps.find.outputs.date }}" || echo "No changes"
          git push

      - name: Build text summary for Telegram
        run: |
          node -e "
          const d = JSON.parse(require('fs').readFileSync('${{ steps.find.outputs.file }}', 'utf8'));
          const strip = s => (s||'').replace(/<[^>]*>/g, '');
          let msg = '📊 *MARKET BRIEFING — ' + d.date + '*\n\n';
          if (d.sentiment) msg += '_Sentiment: ' + d.sentiment + '_\n\n';
          if (d.pulse) msg += strip(d.pulse) + '\n\n';
          if (d.movers && d.movers.length) {
            msg += '*Notable Movers*\n';
            d.movers.forEach(m => msg += '• *' + m.name + '* ' + m.change_pct + ' — ' + m.reason + '\n');
            msg += '\n';
          }
          if (d.alerts && d.alerts.length) {
            msg += '*⚠ Alerts*\n';
            d.alerts.forEach(a => msg += '• ' + a.text + '\n');
            msg += '\n';
          }
          msg += '👉 *Full dashboard:* https://mparellada.github.io/market-briefing/\n';
          if (msg.length > 4000) msg = msg.slice(0, 3990) + '...\n';
          require('fs').writeFileSync('/tmp/message.txt', msg);
          console.log('Message built (' + msg.length + ' chars)');
          "

      - name: Send summary to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(cat /tmp/message.txt)
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat "$CHAT_ID" --arg text "$MSG" \
              '{chat_id: $chat, text: $text, parse_mode: "Markdown", disable_web_page_preview: false}')" \
            | jq '.ok'

  podcast:
    runs-on: ubuntu-latest
    needs: send
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Find latest data file
        id: find
        run: |
          FILE=$(ls -t briefings/data-*.json | head -1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Found: $FILE"

      - name: Generate podcast via NotebookLM
        env:
          GOOGLE_AUTH_STATE: ${{ secrets.GOOGLE_AUTH_STATE }}
        run: |
          cp "${{ steps.find.outputs.file }}" /tmp/data.json
          python notebooklm_podcast.py /tmp/data.json
        timeout-minutes: 15

      - name: Send podcast to Telegram
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f /tmp/podcast.mp3 ]; then
            SIZE=$(stat -c%s /tmp/podcast.mp3)
            echo "Sending podcast ($SIZE bytes)..."
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendAudio" \
              -F "chat_id=${CHAT_ID}" \
              -F "audio=@/tmp/podcast.mp3" \
              -F "title=Market Briefing Podcast" \
              -F "performer=NotebookLM" \
              | jq '.ok'
          else
            echo "No podcast file found"
          fi
